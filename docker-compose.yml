services:
  postgres:
    image: postgres:15-alpine
    container_name: polymarket_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-polymarket}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - polymarket_network

  redis:
    image: redis:7-alpine
    container_name: polymarket_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - polymarket_network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: polymarket_bot
    command: python src/main.py --bankroll 100 --mode paper
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-polymarket}
      - REDIS_URL=redis://redis:6379/0
      - OBSERVATION_MODE=false
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - polymarket_network

  whale-detector:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: polymarket_whale_detector
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/polymarket
    command: python src/run_whale_detection.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - polymarket_network

  # SYS-601-FIX: Broken - file does not exist, logic handled in main.py job #5
  # paper_settlement:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #   container_name: polymarket_paper_settlement
  #   env_file:
  #     - .env
  #   environment:
  #     - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/polymarket
  #     - SETTLEMENT_INTERVAL=600
  #   command: python src/runtime/paper_settlement_service.py
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: always
  #   networks:
  #     - polymarket_network

  roundtrip_builder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: polymarket_roundtrip_builder
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/polymarket
    command: >
      sh -c "while true; do 
        python -m src.strategy.roundtrip_builder; 
        python -m src.strategy.roundtrip_builder --settle; 
        sleep 7200; 
      done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - polymarket_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  polymarket_network:
    driver: bridge
